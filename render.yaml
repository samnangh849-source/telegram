services:
  - type: web
    name: telegram-manual-dashboard
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/database.sqlite
      - key: GOOGLE_SCRIPT_URL
        value: "ដាក់_URL_របស់_Apps_Script_ទីនេះ"
      - key: TELEGRAM_API_ID
        value: "ដាក់_API_ID_ទីនេះ"
      - key: TELEGRAM_API_HASH
        value: "ដាក់_API_HASH_ទីនេះ"
      - key: JWT_SECRET
        value: "បង្កើត_Secret_Key_ទីនេះ"
    disk:
      name: uploads-cache
      mountPath: /app/uploads
      sizeGB: 1
